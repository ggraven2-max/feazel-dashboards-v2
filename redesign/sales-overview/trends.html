<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trends & Momentum · Residential Sales Overview · Feazel</title>
<link rel="stylesheet" href="../shared/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231f2d4b'/><text x='50' y='66' text-anchor='middle' font-family='Arial' font-size='52' font-weight='800' fill='white'>F</text></svg>">
</head>
<body>

<div id="app-host"></div>
<template id="page-tpl"></template>

<!-- Chart.js + theme + shared scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="../shared/chart-theme.js"></script>

<script src="../shared/pages.js"></script>
<script src="../shared/layout.js"></script>
<script src="../shared/page-renderer.js"></script>
<!-- Per-dashboard page definitions (one big file per dashboard) -->
<script src="../shared/page-defs-sales-overview.js"></script>

<script>
  // Mount the shell first, then render the page def
  FZ.renderShell({ folder: "sales-overview", slug: "trends" });
  if (window.FZ_PAGE_DEFS && window.FZ_PAGE_DEFS["sales-overview"] && window.FZ_PAGE_DEFS["sales-overview"]["trends"]) {
    FZ.renderPage(window.FZ_PAGE_DEFS["sales-overview"]["trends"]);
  } else {
    document.getElementById('page-content').innerHTML =
      '<div class="card"><span class="eyebrow">Page</span><h1 style="margin-top:6px;">Trends & Momentum</h1><p style="margin-top:8px;">This page definition is being built. Open another tab from the sub-nav above.</p></div>';
  }
</script>
</body>
</html>
