<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Feazel Command Center · Executive Dashboards</title>
<script src="../shared/mobile-redirect.js"></script>
<link rel="stylesheet" href="../shared/styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='16' fill='%231f2d4b'/><text x='50' y='66' text-anchor='middle' font-family='Arial' font-size='52' font-weight='800' fill='white'>F</text></svg>">
</head>
<body>

<div id="app-host"></div>

<template id="page-tpl">
  <!-- Hero (LOB-themed: glowing window grid + iOS-app title and tagline) -->
  <section class="hub-hero" data-lob="multi-family">
    <span class="eyebrow">MULTI-FAMILY · COMMERCIAL</span>
    <h1>Multi-Family</h1>
    <p class="hero-tagline">By the building. By the block.</p>
    <p class="hero-narrative">One view of where the multi-family and commercial book stands today: signed contracts, the revenue forecast against the <strong data-bind="narrative.budget">—</strong> plan, the open backlog, and what is actually invoicing.</p>
    <div class="hub-hero-stats">
      <div class="hub-hero-stat">
        <div class="l" data-bind="hero.targetLabel">Multi-Family Target</div>
        <div class="v" data-bind="hero.target">—</div>
        <div class="s" data-bind="hero.targetSub">MF plan from Commercial Budget</div>
      </div>
      <div class="hub-hero-stat">
        <div class="l">Signed YTD</div>
        <div class="v" data-bind="hero.signed">—</div>
        <div class="s" data-bind="hero.signedSub">multi-family contracts</div>
      </div>
      <div class="hub-hero-stat">
        <div class="l">Invoiced YTD</div>
        <div class="v" data-bind="hero.invoiced">—</div>
        <div class="s" data-bind="hero.invoicedSub">unique jobs</div>
      </div>
      <div class="hub-hero-stat">
        <div class="l">Open Backlog</div>
        <div class="v" data-bind="hero.backlog">—</div>
        <div class="s" data-bind="hero.backlogSub">active jobs</div>
      </div>
    </div>
  </section>

  <!-- Quick rollup callout -->
  <section class="section">
    <div class="callout">
      <span class="callout-title">Where it stands</span>
      The job-by-job event model projects <strong data-bind="rollup.annualForecast">—</strong> annual invoiced revenue against the
      <strong data-bind="rollup.budget">—</strong> budget, a <strong data-bind="rollup.gap">—</strong> gap. The plan to close it is documented in Revenue Forecast → Budget Recovery
      and Sales Overview → Action Plan. The backlog and installs dashboards show what we have already sold
      and need to deliver on time to convert that pipeline into invoiced revenue.
    </div>
  </section>

  <!-- 4 dashboard tiles -->
  <section class="section">
    <div class="section-head">
      <h2>Dashboards</h2>
      <small>Click into any dashboard for the full sub-tab navigation</small>
    </div>
    <div class="grid grid-2">

      <a class="tile" href="./sales-overview/index.html">
        <div style="display:flex; gap:14px; align-items:flex-start;">
          <div class="tile-mark">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          </div>
          <div>
            <span class="eyebrow" data-bind="tile.sales.eyebrow">YTD</span>
            <h2 style="margin-top:2px;">Multi-Family Sales Overview</h2>
            <p>Signed contracts, kicked-back rate, branch and rep performance, and the levers to close the gap to plan. 13 dedicated tabs.</p>
          </div>
        </div>
        <div class="tile-stats">
          <div class="tile-stat"><div class="l">Signed YTD</div><div class="v" data-bind="tile.sales.signed">—</div></div>
          <div class="tile-stat"><div class="l">Sold</div><div class="v" data-bind="tile.sales.sold">—</div></div>
          <div class="tile-stat"><div class="l">Kicked Back</div><div class="v" data-bind="tile.sales.kicked">—</div></div>
          <div class="tile-stat"><div class="l">Avg Deal</div><div class="v" data-bind="tile.sales.avg">—</div></div>
        </div>
        <span class="tile-cta">Open dashboard <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </a>

      <a class="tile" href="./revenue-forecast/index.html">
        <div style="display:flex; gap:14px; align-items:flex-start;">
          <div class="tile-mark">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-6"/></svg>
          </div>
          <div>
            <span class="eyebrow" data-bind="tile.rev.eyebrow">MF-V1.1</span>
            <h2 style="margin-top:2px;">Multi-Family Revenue Forecast</h2>
            <p>Projects net invoiced revenue against the Commercial Budget plan using a job-by-job event model anchored on Date Moved to Invoiced and NetSuite AR.</p>
          </div>
        </div>
        <div class="tile-stats">
          <div class="tile-stat"><div class="l">Annual Forecast</div><div class="v" data-bind="tile.rev.fcst">—</div></div>
          <div class="tile-stat"><div class="l">Budget</div><div class="v" data-bind="tile.rev.budget">—</div></div>
          <div class="tile-stat"><div class="l">Gap to Plan</div><div class="v" data-bind="tile.rev.gap" style="color:var(--danger);">—</div></div>
          <div class="tile-stat"><div class="l">Active Pipeline</div><div class="v" data-bind="tile.rev.pipe">—</div></div>
        </div>
        <span class="tile-cta">Open dashboard <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </a>

      <a class="tile" href="./backlog/index.html">
        <div style="display:flex; gap:14px; align-items:flex-start;">
          <div class="tile-mark">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
          </div>
          <div>
            <span class="eyebrow">LIVE OPERATIONS</span>
            <h2 style="margin-top:2px;">Multi-Family Job Backlog</h2>
            <p>Work-order-level backlog for the commercial book: open WOs, partial completions, holds, and the value of unfinished work in the field. 9 tabs.</p>
          </div>
        </div>
        <div class="tile-stats">
          <div class="tile-stat"><div class="l">Open WOs</div><div class="v" data-bind="tile.bl.wos">—</div></div>
          <div class="tile-stat"><div class="l">Partial Value</div><div class="v" data-bind="tile.bl.partial">—</div></div>
          <div class="tile-stat"><div class="l">On-Hold WOs</div><div class="v" data-bind="tile.bl.holds">—</div></div>
          <div class="tile-stat"><div class="l">Avg Hold Age</div><div class="v" data-bind="tile.bl.holdAge">—</div></div>
        </div>
        <span class="tile-cta">Open dashboard <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </a>

      <a class="tile" href="./installs-ytd/index.html">
        <div style="display:flex; gap:14px; align-items:flex-start;">
          <div class="tile-mark">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div>
            <span class="eyebrow">INVOICED PRODUCTION</span>
            <h2 style="margin-top:2px;">Multi-Family Installs YTD</h2>
            <p>What is actually closing. Invoiced jobs by PM, market, and trade mix, with multi-trade lift and where cycle time slips. 9 tabs.</p>
          </div>
        </div>
        <div class="tile-stats">
          <div class="tile-stat"><div class="l">True Revenue</div><div class="v" data-bind="tile.inst.rev">—</div></div>
          <div class="tile-stat"><div class="l">Median Days</div><div class="v" data-bind="tile.inst.days">—</div></div>
          <div class="tile-stat"><div class="l">Multi-Trade</div><div class="v" data-bind="tile.inst.mt">—</div></div>
          <div class="tile-stat"><div class="l">Avg Start</div><div class="v" data-bind="tile.inst.start">—</div></div>
        </div>
        <span class="tile-cta">Open dashboard <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></span>
      </a>

    </div>
  </section>

  <!-- Suite-wide context -->
  <section class="section">
    <div class="grid grid-3">
      <div class="card">
        <span class="eyebrow">METHODOLOGY</span>
        <h3 style="margin-top:6px;">Forecast MF-v1.1 Locked</h3>
        <p style="margin-top:8px; font-size:13px;">Job-by-job event model, methodology locked. Revenue anchored on Date Moved to Invoiced (and NetSuite AR for booked actuals); WIP defined as start &le; month-end with no invoice yet. Annual budget from the Commercial Budget XLSX. See Revenue Forecast → Executive Summary.</p>
      </div>
      <div class="card">
        <span class="eyebrow">DATA FRESHNESS</span>
        <h3 style="margin-top:6px;" data-bind="freshness.headline">As of —</h3>
        <p style="margin-top:8px; font-size:13px;">All four dashboards reflect the most recent Commercial Forecasting Report, Lisa's monthly schedules, and the NetSuite AR export. Refreshed <strong data-bind="freshness.stamp">—</strong>.</p>
      </div>
      <div class="card">
        <span class="eyebrow">SCOPE</span>
        <h3 style="margin-top:6px;">Multi-Family &amp; Commercial</h3>
        <p style="margin-top:8px; font-size:13px;">This suite is the multi-family and commercial book under <strong>Todd Sandler</strong> (President), <strong>Jeremy Wolfe</strong> (VP Production), and <strong>Lisa Gibson</strong> (VP Ops). Residential operations sit on a separate dashboard set.</p>
      </div>
    </div>
  </section>

  <!-- Active markets (MF-specific footprint, sourced from the live data) -->
  <section class="section">
    <div class="card">
      <div class="card-head">
        <div>
          <h3>Active MF Markets</h3>
          <span class="caption">Markets with multi-family activity this year, ranked by signed YTD</span>
        </div>
        <div class="caption" id="mf-markets-meta">—</div>
      </div>
      <div class="grid grid-6" style="gap:8px;" id="mf-markets-pills">
        <!-- pills are rendered dynamically from SALES_OVERVIEW.marketScorecard -->
      </div>
    </div>
  </section>
</template>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="../shared/chart-theme.js"></script>
<script src="./shared/data.js"></script>
<script src="../shared/pages.js"></script>
<script src="../shared/layout.js"></script>
<script>
  FZ.renderShell({ atRoot: true });

  // ---- Live binder: pull values from FZ.data into the Command Center hub ----
  (function bindCommandCenter () {
    // Year anchors are computed, never hardcoded, and render even when the
    // data payload is missing.
    var yr = new Date().getFullYear();
    var yearBinds = {
      'hero.targetLabel':   yr + ' Multi-Family Target',
      'tile.sales.eyebrow': 'YTD ' + yr,
      'tile.rev.eyebrow':   'MF-V1.1 · ' + yr + ' OUTLOOK'
    };
    Object.keys(yearBinds).forEach(function (key) {
      var el = document.querySelector('[data-bind="' + key + '"]');
      if (el) el.textContent = yearBinds[key];
    });

    var data = window.FZ && window.FZ.data;
    if (!data) return;

    var SO = data.SALES_OVERVIEW || {};
    var IY = data.INSTALLS_YTD  || {};
    var RF = data.REVENUE_FORECAST || {};
    var BL = data.BACKLOG || {};

    function kpi(list, label) {
      if (!Array.isArray(list)) return null;
      return list.find(function (k) { return k.label === label; }) || null;
    }
    function val(o, dash) { return o && o.value ? o.value : (dash || '—'); }
    function sub(o, dash) { return o && o.sub ? o.sub : (dash || ''); }

    var soSigned   = kpi(SO.kpis, 'Signed Contracts YTD');
    var soSold     = kpi(SO.kpis, 'Sold');
    var soKicked   = kpi(SO.kpis, 'Kicked Back');
    var soAvg      = kpi(SO.kpis, 'Avg Deal Size');

    // The MF payload labels its annual projection 'Plan-Rest Forecast';
    // accept either label so the forecast renders from MF's own numbers.
    var rfFcst     = kpi(RF.kpis, 'Annual Forecast') || kpi(RF.kpis, 'Plan-Rest Forecast');
    var rfBudget   = kpi(RF.kpis, 'Annual Budget');
    var rfGap      = kpi(RF.kpis, 'Forecast vs Budget');
    var rfPipe     = kpi(RF.kpis, 'Active Pipeline');
    var rfInvoiced = kpi(RF.kpis, 'Invoiced YTD');

    var iyRev      = kpi(IY.kpis, 'True Revenue');
    var iyDays     = kpi(IY.kpis, 'Median Days to Complete');
    var iyMT       = kpi(IY.kpis, 'Multi-Trade Jobs');
    var iyStart    = kpi(IY.kpis, 'Avg Days to Start');

    var blExec     = BL.kpisExecutive || [];
    var blOpenWOs  = (BL.headerMeta && BL.headerMeta.totalWOs) ? BL.headerMeta.totalWOs.toLocaleString() : '—';
    var blValue    = kpi(blExec, 'Total Portfolio Value');
    var blPartial  = kpi(BL.kpisPartial || [], 'Trapped Value');
    var blHolds    = kpi(BL.kpisHolds   || [], 'Total Holds');
    var blHoldAge  = kpi(BL.kpisHolds   || [], 'Avg Hold Age');

    var rfBudgetRaw = (RF.execSummary && RF.execSummary.budget) || 0;
    var fmtBigMoney = function (v) {
      if (!v || isNaN(v)) return '—';
      if (v >= 1e9) return '$' + (v / 1e9).toFixed(1).replace(/\.0$/, '') + 'B';
      if (v >= 1e6) return '$' + (v / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
      if (v >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
      return '$' + Math.round(v).toLocaleString('en-US');
    };

    var binds = {
      // Hero
      'hero.target':      fmtBigMoney(rfBudgetRaw),
      'hero.targetSub':   'Annual multi-family budget',
      'narrative.budget': val(rfBudget, fmtBigMoney(rfBudgetRaw)),
      'hero.signed':      val(soSigned),
      'hero.signedSub':   sub(soSigned, 'multi-family contracts'),
      'hero.invoiced':    val(rfInvoiced),
      'hero.invoicedSub': iyRev ? (iyRev.sub || '') : (sub(rfInvoiced)),
      'hero.backlog':     val(blValue),
      'hero.backlogSub':  blValue ? (blValue.sub || '') : (BL.headerMeta ? (BL.headerMeta.totalJobs + ' active jobs') : ''),
      // Rollup callout. No hardcoded fallbacks: missing KPIs render as the
      // standard '—' placeholder, never a stale number (the old literals here
      // were residential figures, the wrong LOB for this page).
      'rollup.annualForecast':val(rfFcst),
      'rollup.budget':        val(rfBudget),
      'rollup.gap':           val(rfGap),
      // Sales tile
      'tile.sales.signed': val(soSigned),
      'tile.sales.sold':   val(soSold),
      'tile.sales.kicked': val(soKicked),
      'tile.sales.avg':    val(soAvg),
      // Revenue tile
      'tile.rev.fcst':   val(rfFcst),
      'tile.rev.budget': val(rfBudget),
      'tile.rev.gap':    val(rfGap),
      'tile.rev.pipe':   val(rfPipe),
      // Backlog tile
      'tile.bl.wos':     blOpenWOs,
      'tile.bl.partial': val(blPartial),
      'tile.bl.holds':   val(blHolds),
      'tile.bl.holdAge': val(blHoldAge),
      // Installs tile
      'tile.inst.rev':   val(iyRev),
      'tile.inst.days':  val(iyDays),
      'tile.inst.mt':    iyMT && iyMT.sub ? iyMT.sub.replace(/ of book.*$/, '') : '—',
      'tile.inst.start': val(iyStart),
      // Freshness
      'freshness.headline': 'As of ' + (window.FZ.formatBuiltAt ? window.FZ.formatBuiltAt({ dateOnly: true }) : '—'),
      'freshness.stamp':    window.FZ.formatBuiltAt ? window.FZ.formatBuiltAt() : '—'
    };

    Object.keys(binds).forEach(function (key) {
      var el = document.querySelector('[data-bind="' + key + '"]');
      if (el) el.textContent = binds[key];
    });

    // ---- Render MF-specific market pills from the live Sales Overview data ----
    (function renderMarkets () {
      var sc = SO && SO.marketScorecard;
      var rows = (sc && Array.isArray(sc.rows)) ? sc.rows : [];
      if (!rows.length) return;
      // Sort by Sales (col 1) descending, then drop the unassigned bucket
      var sorted = rows.slice().filter(function (r) {
        return r && r[0] && !/unassigned|unknown|^—$/i.test(r[0]);
      }).sort(function (a, b) {
        return (b[1] || 0) - (a[1] || 0);
      });

      var totalSales = sorted.reduce(function (s, r) { return s + (r[1] || 0); }, 0);
      var totalDeals = sorted.reduce(function (s, r) { return s + (r[2] || 0); }, 0);

      var fmtM = function (v) {
        if (v == null || isNaN(v)) return '—';
        if (Math.abs(v) >= 1e6) return '$' + (v / 1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
        if (Math.abs(v) >= 1e3) return '$' + (v / 1e3).toFixed(0) + 'K';
        return '$' + Math.round(v).toLocaleString('en-US');
      };

      var meta = document.getElementById('mf-markets-meta');
      if (meta) {
        meta.textContent = sorted.length + ' active markets · ' + fmtM(totalSales) + ' signed · ' + totalDeals.toLocaleString() + ' deals';
      }

      var host = document.getElementById('mf-markets-pills');
      if (host) {
        host.innerHTML = sorted.map(function (r) {
          var name = r[0];
          var sales = fmtM(r[1] || 0);
          // Active=blue, low-volume (<$200K)=muted, top-3=success
          var idx = sorted.indexOf(r);
          var cls = idx < 3 ? 'pill-success' : ((r[1] || 0) < 200000 ? 'pill-warn' : 'pill-info');
          return '<span class="pill ' + cls + '" title="' + name + ' · ' + sales + ' signed · ' + (r[2] || 0) + ' deals">' +
                 name + ' <span style="opacity:.7; margin-left:4px;">' + sales + '</span></span>';
        }).join('');
      }
    })();
  })();
</script>
</body>
</html>
