# Feazel Dashboards — Netlify deploy config

[build]
  # Static publish only. The pipeline runs locally on Greg's machine before
  # each git push. Netlify serves the committed redesign/ folder as-is so the
  # "Refreshed" timestamp on every page reflects when the data was actually
  # pulled, not when Netlify happened to redeploy.
  command = "echo 'Static publish, pipeline runs locally before push.'"
  publish = "redesign"

[build.environment]
  NODE_VERSION = "20"

# Pretty URLs: /sales-overview/executive instead of /sales-overview/executive.html
[[redirects]]
  from = "/sales-overview/:slug"
  to = "/sales-overview/:slug.html"
  status = 200

[[redirects]]
  from = "/revenue-forecast/:slug"
  to = "/revenue-forecast/:slug.html"
  status = 200

[[redirects]]
  from = "/backlog/:slug"
  to = "/backlog/:slug.html"
  status = 200

[[redirects]]
  from = "/installs-ytd/:slug"
  to = "/installs-ytd/:slug.html"
  status = 200

# Mobile suite pretty URLs (iOS app loads these)
[[redirects]]
  from = "/mobile/sales-overview/:slug"
  to = "/mobile/sales-overview/:slug.html"
  status = 200

[[redirects]]
  from = "/mobile/revenue-forecast/:slug"
  to = "/mobile/revenue-forecast/:slug.html"
  status = 200

[[redirects]]
  from = "/mobile/backlog/:slug"
  to = "/mobile/backlog/:slug.html"
  status = 200

[[redirects]]
  from = "/mobile/installs-ytd/:slug"
  to = "/mobile/installs-ytd/:slug.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Long-cache shared assets (data.js gets a content hash via build commit anyway)
[[headers]]
  for = "/assets/*"
    [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
